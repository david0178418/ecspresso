<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tilemap - ECSpresso</title>
	<link rel="stylesheet" href="../styles.css">
	<script src="./tilemap.ts" type="module" defer></script>
	<style>
		#info-panel {
			position: fixed;
			top: 10px;
			right: 10px;
			background: rgba(0, 0, 0, 0.8);
			color: #fff;
			padding: 15px;
			border-radius: 8px;
			font-family: monospace;
			font-size: 13px;
			z-index: 100;
			line-height: 1.6;
			min-width: 220px;
		}
		#info-panel kbd {
			background: rgba(255, 255, 255, 0.15);
			padding: 1px 5px;
			border-radius: 3px;
		}
		#info-panel .attribution {
			margin-top: 10px;
			padding-top: 10px;
			border-top: 1px solid rgba(255, 255, 255, 0.15);
			font-size: 11px;
			color: #aaa;
		}
		#coords {
			margin-top: 8px;
			white-space: pre;
		}
	</style>
</head>
<body>
	<a class="back" href="/">Back</a>
	<div id="info-panel">
		<div><kbd>WASD</kbd> / <kbd>Arrows</kbd> Move</div>
		<div id="coords"></div>
		<div class="attribution">Tiles: Kenney "Tiny Town" (CC0)</div>
	</div>
</body>
</html>
