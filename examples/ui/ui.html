<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>UI / HUD - ECSpresso</title>
	<link rel="stylesheet" href="../styles.css">
	<script src="./ui.ts" type="module" defer></script>
	<style>
		#control-panel {
			position: fixed;
			top: 10px;
			right: 10px;
			background: rgba(0, 0, 0, 0.75);
			color: #eee;
			padding: 12px 16px;
			border-radius: 8px;
			font-family: monospace;
			font-size: 13px;
			z-index: 100;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		#control-panel label {
			display: flex;
			align-items: center;
			gap: 8px;
		}
		#control-panel input[type=range] {
			width: 180px;
		}
	</style>
</head>
<body>
	<a class="back" href="/">Back</a>
	<div id="control-panel">
		<label>
			Health
			<input id="health" type="range" min="0" max="100" value="65">
			<span id="health-val">65</span>
		</label>
		<label>
			Mana
			<input id="mana" type="range" min="0" max="100" value="40">
			<span id="mana-val">40</span>
		</label>
	</div>
</body>
</html>
